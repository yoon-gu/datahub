site_name: DataHub 문서 (한국어)
site_url: https://yoon-gu.github.io/datahub
site_description: DataHub 메타데이터 플랫폼 한국어 문서
repo_url: https://github.com/yoon-gu/datahub
repo_name: yoon-gu/datahub

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ko

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

docs_dir: site-docs

nav:
  - 홈: index.md

  - 핵심 개념 (ERA):
    - DataHub 개념 총정리: what-is-datahub/datahub-concepts.md
    - Entity: what/entity.md
    - Aspect: what/aspect.md
    - Relationship: what/relationship.md
    - URN: what/urn.md
    - 메타데이터 이벤트 (MXE): what/mxe.md
    - 메타데이터 모델: modeling/metadata-model.md
    - 모델 확장하기: modeling/extending-the-metadata-model.md

  - 아키텍처:
    - 시스템 아키텍처: architecture/architecture.md
    - Ingestion 아키텍처: architecture/metadata-ingestion.md
    - Serving 아키텍처: architecture/metadata-serving.md

  - Lineage (데이터 계보):
