    - UI Lineage 관리: features/feature-guides/ui-lineage.md
    - SQL 파싱: lineage/sql_parsing.md
    - Lineage API 튜토리얼: api/tutorials/lineage.md
    - 영향도 분석: act-on-metadata/impact-analysis.md
    - 파일 기반 Lineage: ingestion/docs/sources/file-based-lineage/README.md
